<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Menu</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="qr-menu.css?v=qr-customer-work-v1" />
    <script defer src="customer.js?v=qr-customer-work-v1"></script>
  </head>
  <body>
    <main class="qr-customer-page">
      <section class="scan-shell">
        <header class="scan-hero">
          <div id="scanHeroMedia" class="scan-hero-media"></div>
          <div class="scan-hero-content">
            <div class="phone-header scan-hero-title">
              <div class="hotel-avatar" id="scanHotelAvatar">QR</div>
              <div>
                <strong id="scanHotelName">Loading menu</strong>
                <span id="scanHotelAddress">Please wait</span>
              </div>
            </div>
            <div id="scanHeroStats" class="scan-hero-stats"></div>
          </div>
        </header>

        <div id="scanTabs" class="phone-tabs">
          <button class="is-active" type="button" data-scan-page="food">Menu</button>
          <button type="button" data-scan-page="hotel">Hotel</button>
        </div>

        <section id="scanFoodPage" class="customer-page is-active">
          <div id="scanTools" class="scan-tools-panel">
            <label class="scan-search-box">
              <span>Search</span>
              <input id="scanSearch" placeholder="Search dishes, drinks, offers" />
            </label>
            <select id="scanCategory" aria-label="Food category"></select>
          </div>
          <div id="scanCategoryRail" class="scan-category-rail"></div>
          <div id="scanCategorySections" class="scan-category-sections"></div>
        </section>

        <section id="scanHotelPage" class="customer-page">
          <div id="scanBookingCustomerView" class="scan-booking-customer-view"></div>
          <div id="scanHotelInfo" class="hotel-info-card"></div>
          <div id="scanRoomSummary" class="hotel-info-card"></div>
          <div id="scanRoomList" class="room-normal-view"></div>
          <div id="scanHotelGallery" class="scan-hotel-gallery"></div>
        </section>
      </section>

      <div id="scanMediaModal" class="qr-modal is-hidden" role="dialog" aria-modal="true">
        <div class="qr-modal-card">
          <button class="modal-close" type="button" data-close-scan-modal>&times;</button>
          <div id="scanMediaBody"></div>
        </div>
      </div>

      <div id="scanSmartPopup" class="smart-popup is-hidden" role="dialog" aria-modal="true">
        <div class="smart-popup-card">
          <button class="modal-close" type="button" data-close-scan-popup>&times;</button>
          <span id="scanPopupType">Special Offer</span>
          <h3 id="scanPopupTitle">Offer title</h3>
          <div id="scanPopupImage" class="popup-image"></div>
          <p id="scanPopupOffer">Offer details</p>
          <a id="scanPopupAction" class="primary-button" href="#" target="_blank" rel="noreferrer">Order now</a>
        </div>
      </div>
    </main>
  </body>
</html>
