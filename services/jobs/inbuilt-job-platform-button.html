<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inbuilt Job Platform Button</title>
<style>
  :root{
    --navy:#0b1537;
    --navy2:#101d4a;
    --ink:#0d173d;
    --blue:#2f72ff;
    --blue2:#1e54d7;
    --blue3:#0d4bcf;
    --sky:#6ea4ff;
    --yellow:#ffc21f;
    --yellow2:#ffd95b;
    --shadow: rgba(13, 22, 57, .18);
    --shadow2: rgba(13, 22, 57, .28);
    --bg:#ffffff;
  }

  html, body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    background:
      radial-gradient(1200px 500px at 50% 35%, rgba(245,247,255,.95), rgba(255,255,255,1) 55%),
      linear-gradient(180deg, #fff, #fbfbfd);
    overflow: hidden;
  }

  .stage{
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
  }

  .job-button{
    width: min(99vw, 2009px);
    aspect-ratio: 2009 / 783;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    transform: translateZ(0);
    transition: transform .35s cubic-bezier(.2,.8,.2,1), filter .35s cubic-bezier(.2,.8,.2,1);
    filter: drop-shadow(0 22px 22px rgba(13,22,57,.12));
    outline: none;
  }

  .job-button:hover,
  .job-button:focus-visible{
    transform: translateY(-7px) scale(1.002);
    filter: drop-shadow(0 30px 28px rgba(13,22,57,.17));
  }

  svg{
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  .hover-lift{
    transition: transform .35s cubic-bezier(.2,.8,.2,1), opacity .35s;
    transform-box: fill-box;
    transform-origin: center;
  }

  .job-button:hover .base-shadow{
    opacity: .96;
    transform: translateY(8px) scale(1.03);
  }

  .job-button:hover .briefcase-group{
    transform: translateY(-2px) rotate(-5deg);
  }

  .job-button:hover .arrow-group{
    transform: translateX(4px) scale(1.02);
  }

  .job-button:hover .wobble,
  .job-button:hover .doodle{
    opacity: 1;
  }

  .briefcase-group,
  .arrow-group{
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    transform-box: fill-box;
    transform-origin: center;
  }

  .arrow-bounce{
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    transform-box: fill-box;
    transform-origin: center;
  }

  .job-button:hover .arrow-bounce{
    transform: translateX(6px);
  }

  .caption{
    user-select: none;
  }

  @media (prefers-reduced-motion: reduce){
    .job-button,
    .hover-lift,
    .briefcase-group,
    .arrow-group,
    .arrow-bounce{
      transition: none !important;
      animation: none !important;
    }
  }
</style>
</head>

<script>
  const btn = document.querySelector('.job-button');

  btn.addEventListener('click', () => {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.location.hash = 'career';
        return;
      }
    } catch (error) {
      // Fall through to the standalone link.
    }
    window.location.href = '../../index.html#career';
  });

  // Small interactive polish for hover/focus states.
  btn.addEventListener('pointerenter', () => btn.setAttribute('data-hover', 'true'));
  btn.addEventListener('pointerleave', () => btn.removeAttribute('data-hover'));
  btn.addEventListener('focus', () => btn.setAttribute('data-hover', 'true'));
  btn.addEventListener('blur', () => btn.removeAttribute('data-hover'));

  // Pointer-driven micro sheen.
  btn.addEventListener('pointermove', (e) => {
    const r = btn.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * 100;
    const y = ((e.clientY - r.top) / r.height) * 100;
    btn.style.setProperty('--px', x.toFixed(2) + '%');
    btn.style.setProperty('--py', y.toFixed(2) + '%');
  });
</script>
