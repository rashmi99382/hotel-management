<section id="jobs" class="service-section is-active">
  <div class="section-layout">
    <article class="panel">
      <div class="panel-heading">
        <h2>Inbuilt Job Platform</h2>
        <span>Hiring board</span>
      </div>
      <div id="jobList" class="job-list"></div>
    </article>

    <article class="panel">
      <div class="panel-heading">
        <h2>Post Job</h2>
        <span>Simple form</span>
      </div>
      <form id="jobForm" class="stack-form">
        <input name="title" placeholder="Job title" required />
        <input name="location" placeholder="Location" required />
        <select name="type" required>
          <option value="Full time">Full time</option>
          <option value="Part time">Part time</option>
          <option value="Internship">Internship</option>
        </select>
        <button class="primary-button" type="submit">Publish job</button>
      </form>
    </article>
  </div>
</section>
