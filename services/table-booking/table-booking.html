<section id="booking" class="service-section is-active">
  <div class="booking-module">
    <article class="panel booking-admin-panel">
      <div class="panel-heading">
        <h2>Admin: Booking Media & Room Control</h2>
        <span>Add floors, rooms, room photos, availability and customer view media</span>
      </div>

      <div class="booking-tabs" role="tablist" aria-label="Booking admin tools">
        <button class="booking-tab is-active" type="button" data-booking-admin-tab="floors">Floors & Rooms</button>
        <button class="booking-tab" type="button" data-booking-admin-tab="layout">Customer View</button>
      </div>

      <div class="booking-admin-view is-active" id="bookingAdminFloors">
        <div class="admin-grid">
          <form id="floorForm" class="stack-form mini-form">
            <h3>Add Floor</h3>
            <input name="floorName" placeholder="Example: 1st Floor" required />
            <button class="primary-button" type="submit">Add floor</button>
          </form>

          <form id="roomForm" class="stack-form mini-form">
            <h3>Add Room Inside Floor</h3>
            <select name="floorId" required></select>
            <input name="roomName" placeholder="Example: AC Room" required />
            <select name="roomType" required>
              <option value="AC">AC</option>
              <option value="Non-AC">Non-AC</option>
              <option value="VIP">VIP</option>
              <option value="Family">Family</option>
            </select>
            <div class="form-row">
              <input name="price" type="number" min="0" placeholder="Room price" required />
              <input name="maxPeople" type="number" min="1" placeholder="Max people" required />
            </div>
            <div class="form-row">
              <input name="openTime" type="time" value="18:00" required />
              <input name="closeTime" type="time" value="22:00" required />
            </div>
            <input name="image" type="url" placeholder="Room image URL optional" />
            <button class="primary-button" type="submit">Add room</button>
          </form>
        </div>
        <input id="floorPictureInput" class="visually-hidden-file" type="file" accept="image/*" multiple />
        <input id="roomPictureInput" class="visually-hidden-file" type="file" accept="image/*" multiple />
        <div id="floorRoomList" class="floor-room-list"></div>
      </div>

      <div class="booking-admin-view" id="bookingAdminLayout">
        <div class="customer-preview-shell">
          <div class="panel-heading compact-heading">
            <h2>Customer View Preview</h2>
            <span>This is how users see floor photos and room photos</span>
          </div>

          <div class="customer-controls">
            <select id="customerFloor"></select>
            <select id="customerRoomType"></select>
            <select id="customerRoom"></select>
            <input id="customerRoomSearch" type="search" placeholder="Search floor, room number, AC, VIP or family" />
          </div>

          <div id="customerFloorGallery" class="customer-floor-gallery"></div>
          <div id="customerRoomGallery" class="customer-floor-gallery room-gallery-preview"></div>
        </div>
      </div>
    </article>
    <aside id="bookingQrModeFloat" class="booking-qr-mode-float" aria-live="polite"></aside>
    <aside id="roomConfirmationFloat" class="room-confirmation-float" aria-live="polite"></aside>
  </div>
</section>
