<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in | Smart Hotel Platform</title>
    <link rel="stylesheet" href="auth.css?v=auth-laser-v1" />
    <script defer src="auth-laser.js?v=auth-laser-v1"></script>
    <script defer src="auth.js?v=auth-laser-v1"></script>
  </head>
  <body class="auth-page" data-auth-page="login">
    <div class="auth-flow" aria-hidden="true">
      <canvas id="authLaserCanvas" class="auth-laser-canvas"></canvas>
      <span class="auth-flow-beam"></span>
      <span class="auth-flow-panel"></span>
      <span class="auth-flow-glow"></span>
    </div>

    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="loginTitle">
        <div class="auth-copy">
          <p class="auth-eyebrow">Prototype access</p>
          <h1 id="loginTitle">Smart Hotel Platform</h1>
          <p>Sign in to manage restaurant, hotel, staff, attendance, inventory, and jobs from one simple control panel.</p>
        </div>

        <form id="authLoginForm" class="auth-form">
          <label for="loginEmail">Gmail</label>
          <input id="loginEmail" name="email" type="email" autocomplete="username" placeholder="Enter Gmail" required />

          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Enter password" required />

          <p id="authMessage" class="auth-message" role="alert"></p>
          <button class="auth-primary" type="submit">Log in</button>
          <button class="auth-secondary" type="button" data-auth-back>Back to main website</button>
          <a class="auth-text-link" href="signup.html">Create prototype access</a>
        </form>
      </section>
    </main>
  </body>
</html>
